<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <title>Checkout — Step Up · IMA Summer Camp</title>
  <script src="https://js.stripe.com/v3/" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00e5cc;
      --black: #050505;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --font-body: 'Barlow', sans-serif;
      --font-cond: 'Barlow Condensed', sans-serif;
    }
    html, body { height: 100%; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .checkout-top {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #06060a 0%, var(--black) 100%);
    }
    .checkout-top-title {
      font-family: var(--font-cond);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
    }
    .checkout-back {
      font-family: var(--font-cond);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--cyan);
      text-decoration: none;
      padding: 8px 12px;
      border: 1px solid rgba(0, 229, 204, 0.35);
      border-radius: 6px;
      background: rgba(0, 229, 204, 0.06);
    }
    .checkout-back:hover {
      background: rgba(0, 229, 204, 0.12);
    }
    .checkout-frame-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .checkout-frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--black);
    }
  </style>
</head>
<body>
  <div class="checkout-top">
    <span class="checkout-top-title">Pay with Step Up</span>
    <a class="checkout-back" href="/index.html#schedule">← Week selection</a>
  </div>
  <div class="checkout-frame-wrap" id="checkout-frame-wrap">
    <iframe
      id="ima-checkout-embed"
      title="IMA camp checkout — Step Up"
      src=""
      allow="payment *"
    ></iframe>
  </div>
  <script>
    (function () {
      var q = window.location.search || '';
      var base =
        '/index.html?checkoutEmbed=1&paymentMethod=step_up' + (q ? '&' + q.slice(1) : '') + '#schedule';
      var f = document.getElementById('ima-checkout-embed');
      if (f) f.src = base;
    })();
  </script>
</body>
</html>
