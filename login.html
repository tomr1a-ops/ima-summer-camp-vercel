<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-head">
        <img class="auth-logo" src="/logo.png" alt="Impact Martial Athletics" />
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Parent portal &amp; admin access</div>
      </div>
      <div class="auth-body">
        <div id="msg" class="msg"></div>
        <form id="form">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="username" required />

          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />

          <button class="btn-primary" type="submit" id="btn">Sign In</button>
        </form>
        <div class="link-row">
          New parent? <a href="/register.html">Create an account</a>
        </div>
        <div class="link-row" style="margin-top:10px">
          <a href="/index.html">← Summer camp checkout</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/ima-core.js"></script>
  <script>
    (function () {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const form = document.getElementById('form');

      function show(text, ok) {
        msg.textContent = text;
        msg.className = 'msg show ' + (ok ? 'ok' : 'error');
      }

      var PENDING_REG_KEY = 'ima_pending_registration_v1';

      /**
       * After email confirmation, parent signed up without server role: children were stored here.
       */
      async function flushPendingRegistration(email, accessToken) {
        var raw;
        try {
          raw = localStorage.getItem(PENDING_REG_KEY);
        } catch (e) {
          return null;
        }
        if (!raw) return null;
        var pending;
        try {
          pending = JSON.parse(raw);
        } catch (e) {
          try {
            localStorage.removeItem(PENDING_REG_KEY);
          } catch (e2) {}
          return null;
        }
        if (!pending || String(pending.email).toLowerCase() !== String(email).toLowerCase()) {
          return null;
        }
        var maxAge = 1000 * 60 * 60 * 24 * 14;
        if (!pending.ts || Date.now() - pending.ts > maxAge) {
          try {
            localStorage.removeItem(PENDING_REG_KEY);
          } catch (e3) {}
          return null;
        }
        var er = await fetch('/api/ensure-profile', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + accessToken,
          },
          body: JSON.stringify({
            full_name: pending.fullName,
            phone: pending.phone,
          }),
        });
        var ej = {};
        try {
          ej = await er.json();
        } catch (e4) {
          ej = {};
        }
        if (!er.ok) {
          return { error: (ej && ej.error) || 'Could not complete your profile. Try again or contact IMA.' };
        }
        var children = Array.isArray(pending.children) ? pending.children : [];
        var errs = [];
        for (var i = 0; i < children.length; i++) {
          var ch = children[i];
          var ar = await fetch('/api/add-camper', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + accessToken,
            },
            body: JSON.stringify({
              firstName: ch.firstName,
              lastName: ch.lastName,
              age: ch.age,
            }),
          });
          var aj = {};
          try {
            aj = await ar.json();
          } catch (e5) {
            aj = {};
          }
          if (!ar.ok) {
            errs.push(
              (ch.firstName || '') +
                ' ' +
                (ch.lastName || '') +
                ': ' +
                ((aj && aj.error) || 'could not save')
            );
          }
        }
        try {
          localStorage.removeItem(PENDING_REG_KEY);
        } catch (e6) {}
        if (errs.length) {
          return { partialErrors: errs };
        }
        return { ok: true };
      }

      async function boot() {
        try {
          await IMA.getSupabase();
          const session = await IMA.getSession();
          if (session) {
            const profile = await IMA.getProfile();
            const ret = new URLSearchParams(window.location.search).get('return');
            const safe = ret && ret.startsWith('/') && !ret.startsWith('//') ? ret : null;
            if ((profile && profile.role === 'admin') || IMA.isAdminLoginEmail(session.user && session.user.email)) {
              window.location.replace('/admin.html');
            } else {
              window.location.replace(safe || '/portal.html');
            }
          }
        } catch (e) {
          show(e.message || String(e), false);
        }
      }

      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        msg.className = 'msg';
        btn.disabled = true;
        try {
          const sb = await IMA.getSupabase();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const { data: signData, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          const tok = signData.session && signData.session.access_token;
          const flushed = tok ? await flushPendingRegistration(email, tok) : null;
          if (flushed && flushed.error) {
            show(flushed.error, false);
            btn.disabled = false;
            return;
          }
          if (flushed && flushed.partialErrors && flushed.partialErrors.length) {
            show(
              'Signed in. Some children could not be added automatically:\n' +
                flushed.partialErrors.join('\n') +
                '\n\nAdd them under your account in the portal.',
              false
            );
          }
          let profile = await IMA.getProfile();
          if (!profile && signData.session && signData.session.access_token) {
            const pr = await fetch('/api/ensure-profile', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + signData.session.access_token,
              },
              body: JSON.stringify({}),
            });
            if (pr.ok) {
              profile = await IMA.getProfile();
            } else {
              var pe = {};
              try {
                pe = await pr.json();
              } catch (ePr) {
                pe = {};
              }
              throw new Error(
                (pe && pe.error) || 'Could not create your profile. Check that the site has SUPABASE_SERVICE_ROLE_KEY set, then try again.'
              );
            }
          }
          if (!profile) throw new Error('Profile not found. Complete registration or contact IMA.');
          const ret = new URLSearchParams(window.location.search).get('return');
          const safe = ret && ret.startsWith('/') && !ret.startsWith('//') ? ret : null;
          if (profile.role === 'admin' || IMA.isAdminLoginEmail(session.user && session.user.email)) {
            window.location.replace('/admin.html');
          } else {
            window.location.replace(safe || '/portal.html');
          }
        } catch (e) {
          show(e.message || 'Sign in failed', false);
          btn.disabled = false;
        }
      });

      boot();
    })();
  </script>
</body>
</html>
