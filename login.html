<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Sign In — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
</head>
<body style="background:#050505;color:#f0f0f0">
  <noscript>
    <p style="max-width:420px;margin:24px auto;padding:20px;font-family:system-ui,sans-serif">
      Turn on JavaScript to sign in, then reload.
    </p>
  </noscript>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-head">
        <img class="auth-logo" src="/logo.png" alt="Impact Martial Athletics" />
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Summer camp sign in</div>
      </div>
      <div class="auth-body">
        <div id="msg" class="msg"></div>
        <form id="form">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="username" required />

          <label class="label" for="password">Password</label>
          <div class="auth-password-wrap">
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="auth-password-toggle" id="toggle-password" aria-label="Show password" aria-pressed="false" title="Show password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>

          <button class="btn-primary" type="submit" id="btn">Sign In</button>
        </form>
        <div class="link-row">
          New parent? <a href="/register.html">Create an account</a>
        </div>
        <div class="link-row" style="margin-top:14px;font-size:12px;opacity:0.75">
          IMA staff? <a href="/admin-login.html" style="color:var(--cyan)">Staff sign-in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.1/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script>
(function () {
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btn');
  var form = document.getElementById('form');
  var passwordInput = document.getElementById('password');
  var togglePw = document.getElementById('toggle-password');

  if (togglePw && passwordInput) {
    togglePw.addEventListener('click', function () {
      var showPw = passwordInput.type === 'password';
      passwordInput.type = showPw ? 'text' : 'password';
      togglePw.setAttribute('aria-pressed', showPw ? 'true' : 'false');
      togglePw.setAttribute('aria-label', showPw ? 'Hide password' : 'Show password');
      togglePw.title = showPw ? 'Hide password' : 'Show password';
    });
  }

  function show(text, ok) {
    if (!msg) return;
    msg.textContent = text;
    msg.className = 'msg show ' + (ok ? 'ok' : 'error');
  }

  function authStorage() {
    try {
      var k = '__ima_ls__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      return localStorage;
    } catch (e) {
      var mem = {};
      return {
        getItem: function (key) {
          return Object.prototype.hasOwnProperty.call(mem, key) ? mem[key] : null;
        },
        setItem: function (key, val) {
          mem[key] = String(val);
        },
        removeItem: function (key) {
          delete mem[key];
        }
      };
    }
  }

  var client = null;

  function getClient() {
    if (client) return Promise.resolve(client);
    if (typeof supabase === 'undefined' || typeof supabase.createClient !== 'function') {
      return Promise.reject(new Error('Sign-in library did not load. Refresh or try Safari/Chrome.'));
    }
    return fetch('/api/public-config')
      .then(function (res) {
        if (!res.ok) throw new Error('Could not load configuration.');
        return res.json();
      })
      .then(function (cfg) {
        if (!cfg.url || !cfg.anonKey) throw new Error('Site configuration is incomplete.');
        client = supabase.createClient(cfg.url, cfg.anonKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storage: authStorage()
          }
        });
        return client;
      });
  }

  function loadProfileRole(sb, userId) {
    return sb.from('profiles').select('role').eq('id', userId).maybeSingle();
  }

  function safeCampReturnPath() {
    try {
      var ret = new URLSearchParams(window.location.search).get('return');
      if (ret && ret.startsWith('/') && !ret.startsWith('//')) return ret;
    } catch (e) {}
    return '/portal-landing.html';
  }

  /** Parent camp login never sends users to admin — staff use /admin-login.html only. */
  function goAfterSignIn(sb, session) {
    var token = session.access_token;
    var userId = session.user && session.user.id;
    return loadProfileRole(sb, userId).then(function (pr) {
      if (pr.error) throw pr.error;
      var profile = pr.data;
      if (!profile && token) {
        return fetch('/api/ensure-profile', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token
          },
          body: JSON.stringify({})
        }).then(function (er) {
          if (!er.ok) {
            return er.json().then(
              function (pe) {
                throw new Error((pe && pe.error) || 'Could not create your profile.');
              },
              function () {
                throw new Error('Could not create your profile.');
              }
            );
          }
          return loadProfileRole(sb, userId);
        }).then(function (pr2) {
          if (pr2.error) throw pr2.error;
          return pr2.data;
        });
      }
      return profile;
    }).then(function (profile) {
      if (!profile) throw new Error('Profile not found. Complete registration or contact IMA.');
      window.location.replace(safeCampReturnPath());
    });
  }

  function tryRedirectIfSession() {
    return getClient().then(function (sb) {
      return sb.auth.getSession();
    }).then(function (out) {
      if (out.error) throw out.error;
      if (!out.data.session) return;
      return goAfterSignIn(client, out.data.session);
    });
  }

  if (form && btn && msg) {
    form.addEventListener('submit', function (ev) {
      ev.preventDefault();
      msg.className = 'msg';
      btn.disabled = true;
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      getClient()
        .then(function (sb) {
          return sb.auth.signInWithPassword({ email: email, password: password });
        })
        .then(function (sign) {
          if (sign.error) throw sign.error;
          if (!sign.data.session) throw new Error('No session returned.');
          return goAfterSignIn(client, sign.data.session);
        })
        .catch(function (e) {
          show(e.message || 'Sign in failed', false);
          btn.disabled = false;
        });
    });
  }

  tryRedirectIfSession().catch(function (e) {
    show(e.message || String(e), false);
  });
})();
  </script>
</body>
</html>
