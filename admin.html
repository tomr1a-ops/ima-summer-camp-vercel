<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
  <style>
    .admin-nav-inv {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .admin-nav-inv-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #f59e0b;
      color: #1a1206;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      font-family: var(--font-body);
      letter-spacing: 0;
      text-transform: none;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    .admin-nav-inv-badge[hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/admin.html">
      <img src="/logo.png" alt="" />
      <span>Admin</span>
    </a>
    <div class="app-actions">
      <a class="btn-ghost admin-nav-inv" href="/admin/inventory.html" id="link-inventory">
        <span>Inventory</span>
        <span class="admin-nav-inv-badge" id="inv-low-badge" hidden aria-hidden="true" title="Items at or below reorder point"></span>
      </a>
      <a class="btn-ghost" href="/admin/gear-distribution.html">Gear</a>
      <button type="button" class="btn-ghost" id="btn-portal">Camp site</button>
      <button type="button" class="btn-ghost" id="btn-out">Log out</button>
    </div>
  </header>

  <main class="app-main">
    <div id="banner" class="msg" style="margin-bottom:18px"></div>

    <div class="grid-cards" id="admin-overview">
      <div class="stat-card">
        <h3>Enrolled campers (confirmed)</h3>
        <div class="num" id="st-kids">0</div>
      </div>
      <div class="stat-card">
        <h3>Revenue (confirmed)</h3>
        <div class="num" id="st-rev">$0</div>
      </div>
      <div class="stat-card">
        <h3>Active enrollment rows</h3>
        <div class="num" id="st-enr">0</div>
      </div>
      <div class="stat-card">
        <h3>Cancelled rows</h3>
        <div class="num" id="st-cancel">0</div>
      </div>
    </div>

    <div id="week-people-modal" class="admin-modal" aria-hidden="true">
      <button type="button" class="admin-modal-backdrop" id="week-people-backdrop" aria-label="Close"></button>
      <div class="admin-modal-panel" role="dialog" aria-modal="true" aria-labelledby="week-people-title">
        <div class="admin-modal-head">
          <h2 class="admin-modal-title" id="week-people-title">Week</h2>
          <button type="button" class="btn-ghost" id="week-people-close">Close</button>
        </div>
        <div class="admin-modal-body" id="week-people-body"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Week management <span class="panel-hint">· click the <strong>0/35</strong> count (or row) to see who’s registered</span></div>
      <div class="panel-body" id="week-manage"></div>
    </div>

    <div class="panel">
      <div class="panel-head" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <span>Registrations</span>
        <span style="display:flex;gap:10px;flex-wrap:wrap">
          <select class="input input-inline" id="flt-week" style="min-width:160px;margin:0">
            <option value="">All weeks</option>
          </select>
          <select class="input input-inline" id="flt-status" style="min-width:150px;margin:0">
            <option value="active" selected>Active only</option>
            <option value="all">All statuses</option>
            <option value="cancelled">Cancelled only</option>
          </select>
          <button type="button" class="btn-ghost" id="btn-csv">Export CSV</button>
        </span>
      </div>
      <div class="panel-body table-wrap">
        <table class="data" id="tbl">
          <thead>
            <tr>
              <th>Parent / guest</th>
              <th>Camper</th>
              <th>Week</th>
              <th>Schedule</th>
              <th>Status</th>
              <th>Paid</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/ima-core.js?v=20260330"></script>
  <script>
    (function () {
      const banner = document.getElementById('banner');

      document.getElementById('btn-out').onclick = function () {
        IMA.signOut('/admin-login.html');
      };
      document.getElementById('btn-portal').onclick = function () { window.location.href = '/index.html#schedule'; };

      function showBanner(text, ok) {
        if (!text) {
          banner.className = 'msg';
          banner.textContent = '';
          return;
        }
        banner.textContent = text;
        banner.className = 'msg show ' + (ok ? 'ok' : 'error');
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      var state = { weeks: [], enr: [], parents: {} };

      async function requireAdmin() {
        const session = await IMA.requireAuth('/admin-login.html');
        if (!session) return null;
        const profile = await IMA.getProfile();
        if (!profile) {
          showBanner('No profile found.', false);
          window.location.replace('/index.html#schedule');
          return null;
        }
        const em = String(session.user && session.user.email ? session.user.email : '').toLowerCase();
        if (profile.role !== 'admin' && !IMA.isAdminLoginEmail(em)) {
          showBanner('Admin access only.', false);
          window.location.replace('/index.html#schedule');
          return null;
        }
        return { session: session, profile: profile };
      }

      async function loadWeeks(sb) {
        const { data, error } = await sb.from('weeks').select('*').order('week_number');
        if (error) throw error;
        return data || [];
      }

      /** Max days.current_enrollment per week_id — same source as /api/weeks and portal. */
      async function loadWeekPeakEnrollmentByWeekId(sb) {
        const { data, error } = await sb.from('days').select('week_id,current_enrollment');
        if (error) throw error;
        const peak = {};
        (data || []).forEach(function (d) {
          const wid = String(d.week_id);
          const n = Number(d.current_enrollment) || 0;
          peak[wid] = Math.max(peak[wid] || 0, n);
        });
        return peak;
      }

      async function loadEnrollments(sb) {
        const { data, error } = await sb
          .from('enrollments')
          .select('id,parent_id,camper_id,week_id,status,price_paid,registration_fee_paid,day_ids,guest_email,created_at, campers(first_name,last_name), weeks(label,week_number)')
          .order('created_at', { ascending: false });
        if (error) {
          const { data: d2, error: e2 } = await sb.from('enrollments').select('*').order('created_at', { ascending: false });
          if (e2) throw e2;
          return d2 || [];
        }
        return data || [];
      }

      async function hydrateParents(sb, rows) {
        const ids = [...new Set(rows.map(function (r) { return r.parent_id; }).filter(Boolean))];
        if (!ids.length) return {};
        const { data, error } = await sb.from('profiles').select('id,full_name,email').in('id', ids);
        if (error) throw error;
        const m = {};
        (data || []).forEach(function (p) { m[p.id] = p; });
        return m;
      }

      async function hydrateCampersWeeks(sb, rows) {
        const needC = {};
        const needW = {};
        rows.forEach(function (r) {
          if (!r.campers) needC[r.camper_id] = true;
          if (!r.weeks) needW[r.week_id] = true;
        });
        const cmap = {};
        const wmap = {};
        const cids = Object.keys(needC);
        const wids = Object.keys(needW);
        if (cids.length) {
          const { data } = await sb.from('campers').select('id,first_name,last_name').in('id', cids);
          (data || []).forEach(function (c) { cmap[c.id] = c; });
        }
        if (wids.length) {
          const { data } = await sb.from('weeks').select('id,label,week_number').in('id', wids);
          (data || []).forEach(function (w) { wmap[w.id] = w; });
        }
        rows.forEach(function (r) {
          if (!r.campers && cmap[r.camper_id]) r.campers = cmap[r.camper_id];
          if (!r.weeks && wmap[r.week_id]) r.weeks = wmap[r.week_id];
        });
      }

      function overviewStats(enr) {
        const confirmed = enr.filter(function (e) { return e.status === 'confirmed'; });
        const activeRows = enr.filter(function (e) {
          return e.status === 'confirmed' || e.status === 'pending';
        });
        const cancelledRows = enr.filter(function (e) { return e.status === 'cancelled'; });
        const campers = {};
        confirmed.forEach(function (e) { campers[e.camper_id] = true; });
        const rev = confirmed.reduce(function (s, e) { return s + (Number(e.price_paid) || 0); }, 0);
        document.getElementById('st-kids').textContent = String(Object.keys(campers).length);
        document.getElementById('st-rev').textContent = IMA.formatMoney(rev);
        document.getElementById('st-enr').textContent = String(activeRows.length);
        var stc = document.getElementById('st-cancel');
        if (stc) stc.textContent = String(cancelledRows.length);
      }

      function closeWeekPeopleModal() {
        const modal = document.getElementById('week-people-modal');
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }

      function openWeekPeopleModal(weekId) {
        const w = state.weeks.find(function (x) {
          return String(x.id) === String(weekId);
        });
        const label = w ? w.label : 'Week';
        const rows = state.enr.filter(function (e) {
          return String(e.week_id) === String(weekId);
        });
        rows.sort(function (a, b) {
          const sa = a.status === 'confirmed' ? 0 : 1;
          const sb = b.status === 'confirmed' ? 0 : 1;
          if (sa !== sb) return sa - sb;
          const ca = a.campers || {};
          const cb = b.campers || {};
          const na = (ca.first_name || '') + ' ' + (ca.last_name || '');
          const nb = (cb.first_name || '') + ' ' + (cb.last_name || '');
          return na.localeCompare(nb);
        });
        const titleEl = document.getElementById('week-people-title');
        const bodyEl = document.getElementById('week-people-body');
        const modal = document.getElementById('week-people-modal');
        titleEl.textContent = label + ' — roster';
        if (!rows.length) {
          bodyEl.innerHTML = '<p class="empty-hint">No enrollments for this week yet.</p>';
        } else {
          const activeRoster = rows.filter(function (r) {
            return r.status !== 'cancelled';
          });
          const cancelledRoster = rows.filter(function (r) {
            return r.status === 'cancelled';
          });
          const distinct = {};
          activeRoster
            .filter(function (r) {
              return r.status === 'confirmed';
            })
            .forEach(function (r) {
              distinct[r.camper_id] = true;
            });
          const summary =
            '<p class="empty-hint" style="margin-bottom:12px">' +
            Object.keys(distinct).length +
            ' distinct camper(s) with confirmed enrollment · ' +
            activeRoster.length +
            ' active row(s). Week capacity on the list above uses <strong>days.current_enrollment</strong>.</p>';
          function rosterTable(title, list) {
            if (!list.length) return '';
            return (
              '<h4 style="margin:16px 0 8px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#888">' +
              escapeHtml(title) +
              '</h4>' +
              '<table class="week-roster-table"><thead><tr>' +
              '<th>Camper</th><th>Parent / guest</th><th>Schedule</th><th>Status</th><th>Paid</th>' +
              '</tr></thead><tbody>' +
              list
                .map(function (e) {
                  const c = e.campers || {};
                  const cname = escapeHtml((c.first_name || '') + ' ' + (c.last_name || ''));
                  return (
                    '<tr><td>' +
                    cname +
                    '</td><td>' +
                    parentGuestLabel(e, state.parents) +
                    '</td><td>' +
                    escapeHtml(scheduleLabel(e)) +
                    '</td><td>' +
                    escapeHtml(e.status) +
                    '</td><td>' +
                    escapeHtml(IMA.formatMoney(e.price_paid)) +
                    '</td></tr>'
                  );
                })
                .join('') +
              '</tbody></table>'
            );
          }
          bodyEl.innerHTML =
            summary + rosterTable('Active & pending', activeRoster) + rosterTable('Cancelled', cancelledRoster);
        }
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        document.getElementById('week-people-close').focus();
      }

      var rosterUiBound = false;

      function bindRosterModalUiOnce() {
        if (rosterUiBound) return;
        rosterUiBound = true;
        const modal = document.getElementById('week-people-modal');
        const manage = document.getElementById('week-manage');
        manage.addEventListener('click', function (ev) {
          if (ev.target.closest('[data-week-active]') || ev.target.closest('.week-manage-active')) return;
          const row = ev.target.closest('.week-manage-row');
          if (!row) return;
          openWeekPeopleModal(row.getAttribute('data-week-id'));
        });
        manage.addEventListener('keydown', function (ev) {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          if (ev.target.closest('[data-week-active]')) return;
          const row = ev.target.closest('.week-manage-row');
          if (!row) return;
          ev.preventDefault();
          openWeekPeopleModal(row.getAttribute('data-week-id'));
        });
        document.getElementById('week-people-close').addEventListener('click', closeWeekPeopleModal);
        document.getElementById('week-people-backdrop').addEventListener('click', closeWeekPeopleModal);
        document.addEventListener('keydown', function (ev) {
          if (ev.key === 'Escape' && modal.classList.contains('open')) closeWeekPeopleModal();
        });
      }

      function renderWeekManage(sb, weeks, peakByWeekId) {
        const el = document.getElementById('week-manage');
        el.innerHTML = weeks
          .map(function (w) {
            const wid = String(w.id);
            const n = peakByWeekId[wid] != null ? peakByWeekId[wid] : 0;
            const max = w.max_capacity || 35;
            const pct = Math.min(100, Math.round((n / max) * 100));
            const full = !!w.is_full || n >= max;
            return (
              '<div class="week-manage-row week-row-admin" data-week-id="' +
              escapeHtml(String(w.id)) +
              '" tabindex="0" role="button" aria-label="View roster for ' +
              escapeHtml(w.label) +
              '">' +
              '<div class="week-manage-row-body">' +
              '<div class="meta">' +
              '<span class="week-manage-label-text">' +
              escapeHtml(w.label) +
              '</span>' +
              '<span class="week-capacity-btn" title="Who is registered for this week?">' +
              n +
              '/' +
              max +
              (full ? ' · FULL' : '') +
              '</span></div>' +
              '<div class="progress-bar"><i style="width:' +
              pct +
              '%"></i></div>' +
              '</div>' +
              '<label class="week-manage-active">' +
              '<input type="checkbox" data-week-active="' +
              escapeHtml(String(w.id)) +
              '" ' +
              (w.is_active ? 'checked' : '') +
              '/> Active' +
              '</label>' +
              '</div>'
            );
          })
          .join('');
        el.querySelectorAll('input[data-week-active]').forEach(function (cb) {
          cb.addEventListener('change', async function (ev) {
            ev.stopPropagation();
            const id = cb.getAttribute('data-week-active');
            try {
              const { error } = await sb.from('weeks').update({ is_active: cb.checked }).eq('id', id);
              if (error) throw error;
              showBanner('Week updated.', true);
            } catch (e) {
              showBanner(e.message || String(e), false);
              cb.checked = !cb.checked;
            }
          });
        });
      }

      function fillWeekFilterSelect() {
        const fw = document.getElementById('flt-week');
        fw.innerHTML =
          '<option value="">All weeks</option>' +
          state.weeks
            .map(function (w) {
              return '<option value="' + w.id + '">' + escapeHtml(w.label) + '</option>';
            })
            .join('');
      }

      function parentGuestLabel(e, parents) {
        if (!e.parent_id && e.guest_email) {
          return 'Guest · ' + escapeHtml(e.guest_email);
        }
        if (!e.parent_id) {
          return '<span style="color:#888">No parent (pending)</span>';
        }
        const p = parents[e.parent_id] || {};
        return escapeHtml(p.full_name || p.email || e.parent_id);
      }

      function scheduleLabel(e) {
        const n = (e.day_ids || []).length;
        if (n >= 5) return 'Full week';
        if (!n) return '—';
        return n + ' day' + (n === 1 ? '' : 's');
      }

      function filterEnrollmentsForTable(enr) {
        const flt = document.getElementById('flt-week').value;
        const st = document.getElementById('flt-status') && document.getElementById('flt-status').value;
        return enr.filter(function (e) {
          if (flt && e.week_id !== flt) return false;
          if (st === 'active') return e.status === 'confirmed' || e.status === 'pending';
          if (st === 'cancelled') return e.status === 'cancelled';
          return true;
        });
      }

      function renderTable(enr, parents) {
        const body = document.querySelector('#tbl tbody');
        const rows = filterEnrollmentsForTable(enr);
        body.innerHTML = rows.map(function (e) {
          const c = e.campers || {};
          const w = e.weeks || {};
          const pname = parentGuestLabel(e, parents);
          const cname = escapeHtml((c.first_name || '') + ' ' + (c.last_name || ''));
          return (
            '<tr><td>' +
            pname +
            '</td><td>' +
            cname +
            '</td><td>' +
            escapeHtml(w.label || '') +
            '</td><td>' +
            escapeHtml(scheduleLabel(e)) +
            '</td><td>' +
            escapeHtml(e.status) +
            '</td><td>' +
            escapeHtml(IMA.formatMoney(e.price_paid)) +
            '</td><td>' +
            escapeHtml(IMA.formatDate(e.created_at)) +
            '</td></tr>'
          );
        }).join('');
      }

      function exportCsv(enr, parents) {
        const rows = filterEnrollmentsForTable(enr);
        const lines = [['parent_name', 'parent_email', 'guest_email', 'camper', 'week', 'schedule', 'status', 'price_paid', 'created_at'].join(',')];
        rows.forEach(function (e) {
          const p = parents[e.parent_id] || {};
          const c = e.campers || {};
          const w = e.weeks || {};
          lines.push([
            csv(p.full_name || ''),
            csv(p.email || ''),
            csv(e.guest_email || ''),
            csv((c.first_name || '') + ' ' + (c.last_name || '')),
            csv(w.label || ''),
            csv(scheduleLabel(e)),
            csv(e.status),
            csv(String(e.price_paid)),
            csv(e.created_at),
          ].join(','));
        });
        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'ima-registrations.csv';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function csv(s) {
        const t = String(s);
        if (/[",\n]/.test(t)) return '"' + t.replace(/"/g, '""') + '"';
        return t;
      }

      function inventoryLowStockCount(rows) {
        return (rows || []).filter(function (r) {
          if (r.reorder_point == null || r.reorder_point === '') return false;
          const rp = Number(r.reorder_point);
          if (!Number.isFinite(rp)) return false;
          return Number(r.quantity_on_hand) <= rp;
        }).length;
      }

      async function refreshInventoryLowBadge(sb) {
        const el = document.getElementById('inv-low-badge');
        if (!el) return;
        try {
          const { data, error } = await sb.from('inventory_items').select('quantity_on_hand,reorder_point');
          if (error) throw error;
          const n = inventoryLowStockCount(data || []);
          el.textContent = String(n);
          el.hidden = n === 0;
          el.setAttribute('aria-hidden', n === 0 ? 'true' : 'false');
        } catch (e) {
          el.hidden = true;
          el.setAttribute('aria-hidden', 'true');
        }
      }

      async function boot() {
        const ctx = await requireAdmin();
        if (!ctx) return;
        const sb = await IMA.getSupabase();

        refreshInventoryLowBadge(sb);

        state.weeks = await loadWeeks(sb);
        state.enr = await loadEnrollments(sb);
        await hydrateCampersWeeks(sb, state.enr);
        state.parents = await hydrateParents(sb, state.enr);
        const peakByWeekId = await loadWeekPeakEnrollmentByWeekId(sb);

        overviewStats(state.enr);
        renderWeekManage(sb, state.weeks, peakByWeekId);
        bindRosterModalUiOnce();
        fillWeekFilterSelect();
        renderTable(state.enr, state.parents);

        document.getElementById('flt-week').addEventListener('change', function () {
          renderTable(state.enr, state.parents);
        });
        document.getElementById('flt-status').addEventListener('change', function () {
          renderTable(state.enr, state.parents);
        });
        document.getElementById('btn-csv').addEventListener('click', function () {
          exportCsv(state.enr, state.parents);
        });
      }

      boot().catch(function (e) {
        showBanner(e.message || String(e), false);
      });
    })();
  </script>
</body>
</html>
