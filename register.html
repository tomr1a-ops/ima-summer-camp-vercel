<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card auth-card-wide">
      <div class="auth-card-head">
        <img class="auth-logo" src="/logo.png" alt="Impact Martial Athletics" />
        <div class="auth-title">Parent Account</div>
        <div class="auth-sub">Register to manage camp bookings</div>
      </div>
      <div class="auth-body">
        <div id="msg" class="msg"></div>
        <form id="form">
          <label class="label" for="full_name">Your full name (parent)</label>
          <input class="input" id="full_name" name="full_name" type="text" autocomplete="name" required />

          <label class="label" for="phone">Phone</label>
          <input class="input" id="phone" name="phone" type="tel" autocomplete="tel" required />

          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" required />

          <label class="label" for="password">Password</label>
          <input class="input" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />

          <label class="label" for="child-count">How many children are you signing up?</label>
          <select class="input" id="child-count" name="child_count" required aria-describedby="child-count-hint">
            <option value="1">1 child</option>
            <option value="2">2 children</option>
            <option value="3">3 children</option>
            <option value="4">4 children</option>
            <option value="5">5 children</option>
            <option value="6">6 children</option>
            <option value="7">7 children</option>
            <option value="8">8 children</option>
          </select>
          <p id="child-count-hint" class="reg-kids-intro">Enter each child’s name and age below. You can add or edit children later in the parent portal.</p>

          <div id="children-mount" aria-live="polite"></div>

          <button class="btn-primary" type="submit" id="btn">Create account</button>
        </form>
        <div class="link-row">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
        <div class="link-row" style="margin-top:10px">
          <a href="/index.html">← Summer camp checkout</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/ima-core.js"></script>
  <script>
    (function () {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const form = document.getElementById('form');
      const mount = document.getElementById('children-mount');
      const countEl = document.getElementById('child-count');

      function show(text, ok) {
        msg.textContent = text;
        msg.className = 'msg show ' + (ok ? 'ok' : 'error');
      }

      function safeReturnPath() {
        var ret = new URLSearchParams(window.location.search).get('return');
        return ret && ret.startsWith('/') && !ret.startsWith('//') ? ret : '/portal.html';
      }

      function isMissingServiceRoleResponse(status, j) {
        if (status === 503) return true;
        var e = j && j.error ? String(j.error) : '';
        return e.indexOf('SUPABASE_SERVICE_ROLE_KEY') !== -1 || e.indexOf('service_role') !== -1;
      }

      /**
       * When Vercel has no service role key: signUp + RLS-safe profile/camper writes (requires session — turn off email confirm in Supabase).
       * Returns true if children partially failed (caller re-enables button).
       */
      async function registerViaClientFallback(sb, email, password, full_name, phone, children) {
        var up = await sb.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { full_name: full_name, phone: phone },
            emailRedirectTo: window.location.origin + '/portal.html',
          },
        });
        if (up.error) throw up.error;
        var user = up.data && up.data.user;
        if (!user) throw new Error('Sign-up did not return a user.');
        var sess = up.data && up.data.session;
        if (!sess) {
          throw new Error(
            'No session after sign-up (email confirmation is probably ON).\n\nFix one of:\n• Supabase → Authentication → Providers → Email → turn OFF "Confirm email", then try again.\n• Or add SUPABASE_SERVICE_ROLE_KEY on Vercel so server registration works.'
          );
        }
        var pe = await sb.from('profiles').upsert(
          {
            id: user.id,
            email: email,
            full_name: full_name,
            phone: phone,
            role: 'parent',
          },
          { onConflict: 'id' }
        );
        if (pe.error) throw new Error(pe.error.message || 'Could not save profile');

        var childErrs = [];
        for (var i = 0; i < children.length; i++) {
          var ch = children[i];
          var ins = await sb.from('campers').insert({
            parent_id: user.id,
            first_name: ch.firstName,
            last_name: ch.lastName,
            age: ch.age,
          });
          if (ins.error) childErrs.push(ch.firstName + ' ' + ch.lastName + ': ' + ins.error.message);
        }
        if (childErrs.length) {
          show(
            'Account created. Some children could not be saved:\n' + childErrs.join('\n') + '\n\nAdd them in the parent portal.',
            false
          );
          return true;
        }
        window.location.replace(safeReturnPath());
        return false;
      }

      function renderChildFields() {
        var n = parseInt(countEl.value, 10) || 1;
        n = Math.max(1, Math.min(8, n));
        mount.innerHTML = '';
        for (var i = 0; i < n; i++) {
          var block = document.createElement('div');
          block.className = 'reg-child-block';
          var h = document.createElement('h3');
          h.textContent = 'Child ' + (i + 1);
          block.appendChild(h);

          var lf = document.createElement('label');
          lf.className = 'label';
          lf.setAttribute('for', 'kid-' + i + '-first');
          lf.textContent = 'First name';
          block.appendChild(lf);
          var inf = document.createElement('input');
          inf.className = 'input';
          inf.type = 'text';
          inf.id = 'kid-' + i + '-first';
          inf.name = 'kid_' + i + '_first';
          inf.autocomplete = 'off';
          inf.required = true;
          block.appendChild(inf);

          var ll = document.createElement('label');
          ll.className = 'label';
          ll.setAttribute('for', 'kid-' + i + '-last');
          ll.textContent = 'Last name';
          block.appendChild(ll);
          var inl = document.createElement('input');
          inl.className = 'input';
          inl.type = 'text';
          inl.id = 'kid-' + i + '-last';
          inl.name = 'kid_' + i + '_last';
          inl.autocomplete = 'off';
          inl.required = true;
          block.appendChild(inl);

          var la = document.createElement('label');
          la.className = 'label';
          la.setAttribute('for', 'kid-' + i + '-age');
          la.textContent = 'Age';
          block.appendChild(la);
          var ina = document.createElement('input');
          ina.className = 'input';
          ina.type = 'number';
          ina.id = 'kid-' + i + '-age';
          ina.name = 'kid_' + i + '_age';
          ina.min = '3';
          ina.max = '18';
          ina.required = true;
          block.appendChild(ina);

          mount.appendChild(block);
        }
      }

      function collectChildren(n) {
        var list = [];
        for (var i = 0; i < n; i++) {
          var fn = document.getElementById('kid-' + i + '-first').value.trim();
          var ln = document.getElementById('kid-' + i + '-last').value.trim();
          var age = parseInt(document.getElementById('kid-' + i + '-age').value, 10);
          if (!fn || !ln) {
            throw new Error('Please enter first and last name for child ' + (i + 1) + '.');
          }
          if (!Number.isFinite(age) || age < 3 || age > 18) {
            throw new Error('Please enter a valid age (3–18) for child ' + (i + 1) + '.');
          }
          list.push({ firstName: fn, lastName: ln, age: age });
        }
        return list;
      }

      countEl.addEventListener('change', renderChildFields);

      async function boot() {
        try {
          await IMA.getSupabase();
          const session = await IMA.getSession();
          if (session) window.location.replace(safeReturnPath());
        } catch (e) {
          show(e.message || String(e), false);
        }
      }

      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        msg.className = 'msg';
        btn.disabled = true;
        try {
          const sb = await IMA.getSupabase();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const full_name = document.getElementById('full_name').value.trim();
          const phone = document.getElementById('phone').value.trim();
          var nKids = parseInt(countEl.value, 10) || 1;
          nKids = Math.max(1, Math.min(8, nKids));
          var children = collectChildren(nKids);

          const res = await fetch('/api/register-parent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              password: password,
              fullName: full_name,
              phone: phone,
            }),
          });
          const raw = await res.text();
          var j = {};
          try {
            j = raw ? JSON.parse(raw) : {};
          } catch (parseErr) {
            j = {};
          }

          if (!res.ok && isMissingServiceRoleResponse(res.status, j)) {
            var partial = await registerViaClientFallback(sb, email, password, full_name, phone, children);
            if (partial) btn.disabled = false;
            return;
          }

          if (!res.ok) {
            var detail = j.error || j.message || raw || 'Registration failed';
            throw new Error(typeof detail === 'string' ? detail : 'Registration failed');
          }

          const { data: signData, error: se } = await sb.auth.signInWithPassword({ email: email, password: password });
          if (se) throw se;
          var tok = signData.session && signData.session.access_token;
          if (!tok) throw new Error('Signed in but no session token. Try signing in manually.');

          var saveErrors = [];
          for (var c = 0; c < children.length; c++) {
            var ch = children[c];
            var ar = await fetch('/api/add-camper', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + tok,
              },
              body: JSON.stringify({
                firstName: ch.firstName,
                lastName: ch.lastName,
                age: ch.age,
              }),
            });
            var aj = await ar.json().catch(function () {
              return {};
            });
            if (!ar.ok) {
              saveErrors.push(ch.firstName + ' ' + ch.lastName + ': ' + (aj.error || 'could not save'));
            }
          }

          if (saveErrors.length) {
            show(
              'Account created, but some children could not be saved: ' + saveErrors.join(' · ') + ' You can add them in the portal.',
              false
            );
            btn.disabled = false;
            return;
          }

          window.location.replace(safeReturnPath());
        } catch (e) {
          show(e.message || 'Registration failed', false);
        }
        btn.disabled = false;
      });

      renderChildFields();
      boot();
    })();
  </script>
</body>
</html>
