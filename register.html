<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Create Account — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-head">
        <img class="auth-logo" src="/logo.png" alt="Impact Martial Athletics" />
        <div class="auth-title">Parent Account</div>
        <div class="auth-sub">Name, email &amp; password — add children after you sign in</div>
      </div>
      <div class="auth-body">
        <div id="msg" class="msg"></div>
        <form id="form">
          <label class="label" for="full_name">Your full name</label>
          <input class="input" id="full_name" name="full_name" type="text" autocomplete="name" required />

          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" required />

          <label class="label" for="password">Password</label>
          <div class="auth-password-wrap">
            <input class="input" id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="auth-password-toggle" id="toggle-password" aria-label="Show password" aria-pressed="false" title="Show password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>

          <button class="btn-primary" type="submit" id="btn">Create account</button>
        </form>
        <div class="link-row">
          Already have an account? <a href="/login.html" id="signin-link">Sign in</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/ima-core.js?v=20260330"></script>
  <script>
    (function () {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const form = document.getElementById('form');
      const passwordInput = document.getElementById('password');
      const togglePw = document.getElementById('toggle-password');
      const signinLink = document.getElementById('signin-link');

      function shouldOfferAuthHelp(errText) {
        var t = String(errText || '');
        return (
          /confirm email|email confirmation|No session after sign-up|SUPABASE_SERVICE_ROLE_KEY|service.?role|Missing Supabase service role/i.test(
            t
          )
        );
      }

      function show(text, ok, helpUrl) {
        msg.className = 'msg show ' + (ok ? 'ok' : 'error');
        if (!helpUrl || ok) {
          msg.textContent = text;
          return;
        }
        msg.textContent = '';
        var p = document.createElement('p');
        p.style.margin = '0';
        p.style.whiteSpace = 'pre-line';
        p.textContent = text;
        msg.appendChild(p);
        var a = document.createElement('a');
        a.href = helpUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = 'Open Supabase → Authentication → Providers (turn off Confirm email)';
        a.style.display = 'inline-block';
        a.style.marginTop = '10px';
        msg.appendChild(a);
      }

      function safeReturnPath() {
        var ret = new URLSearchParams(window.location.search).get('return');
        if (ret && ret.startsWith('/') && !ret.startsWith('//')) return ret;
        return '/portal-landing.html';
      }

      function wireSignInLink() {
        var ret = new URLSearchParams(window.location.search).get('return');
        if (ret && ret.startsWith('/') && !ret.startsWith('//') && signinLink) {
          signinLink.href = '/login.html?return=' + encodeURIComponent(ret);
        }
      }

      if (togglePw && passwordInput) {
        togglePw.addEventListener('click', function () {
          var showPw = passwordInput.type === 'password';
          passwordInput.type = showPw ? 'text' : 'password';
          togglePw.setAttribute('aria-pressed', showPw ? 'true' : 'false');
          togglePw.setAttribute('aria-label', showPw ? 'Hide password' : 'Show password');
          togglePw.title = showPw ? 'Hide password' : 'Show password';
        });
      }

      async function boot() {
        wireSignInLink();
        try {
          await IMA.getSupabase();
          const session = await IMA.getSession();
          if (session) window.location.replace(safeReturnPath());
        } catch (e) {
          var em = e.message || String(e);
          var hu = window.IMA && IMA.authProvidersHelpUrl && shouldOfferAuthHelp(em) ? IMA.authProvidersHelpUrl : null;
          show(em, false, hu);
        }
      }

      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        msg.className = 'msg';
        btn.disabled = true;
        try {
          const sb = await IMA.getSupabase();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const full_name = document.getElementById('full_name').value.trim();

          const res = await fetch('/api/register-parent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              password: password,
              fullName: full_name,
            }),
          });
          const raw = await res.text();
          var j = {};
          try {
            j = raw ? JSON.parse(raw) : {};
          } catch (parseErr) {
            j = {};
          }

          if (!res.ok && (res.status === 503 || j.code === 'MISSING_SERVICE_ROLE')) {
            var detail503 = j.error || j.message || raw || 'Registration is temporarily unavailable.';
            show(detail503, false, null);
            btn.disabled = false;
            return;
          }

          if (!res.ok) {
            var detail = j.error || j.message || raw || 'Registration failed';
            throw new Error(typeof detail === 'string' ? detail : 'Registration failed');
          }

          const { data: signData, error: se } = await sb.auth.signInWithPassword({ email: email, password: password });
          if (se) throw se;
          var tok = signData.session && signData.session.access_token;
          if (!tok) throw new Error('Signed in but no session token. Try signing in manually.');

          window.location.replace(safeReturnPath());
        } catch (e) {
          var em2 = e.message || 'Registration failed';
          var hu2 = window.IMA && IMA.authProvidersHelpUrl && shouldOfferAuthHelp(em2) ? IMA.authProvidersHelpUrl : null;
          show(em2, false, hu2);
        }
        btn.disabled = false;
      });

      boot();
    })();
  </script>
</body>
</html>
