<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Sign In — IMA Summer Camp</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-card-head">
        <img class="auth-logo" src="/logo.png" alt="Impact Martial Athletics" />
        <div class="auth-title">Staff Sign In</div>
        <div class="auth-sub">Camp admin &amp; registrations — not for parent accounts</div>
      </div>
      <div class="auth-body">
        <div id="msg" class="msg"></div>
        <form id="form">
          <label class="label" for="email">Staff email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="username" required />

          <label class="label" for="password">Password</label>
          <div class="auth-password-wrap">
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
            <button type="button" class="auth-password-toggle" id="toggle-password" aria-label="Show password" aria-pressed="false" title="Show password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>

          <label class="auth-remember" for="remember-email">
            <input type="checkbox" id="remember-email" name="remember_email" />
            <span>Remember my email on this device<span class="auth-remember-hint">Your browser can save your password when you choose Save in its prompt.</span></span>
          </label>

          <button class="btn-primary" type="submit" id="btn">Sign In</button>
        </form>
        <div class="link-row" style="margin-top:10px">
          <a href="/login.html">← Parent sign-in (camp registration)</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/ima-core.js?v=20260330"></script>
  <script>
    (function () {
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const form = document.getElementById('form');
      const passwordInput = document.getElementById('password');
      const togglePw = document.getElementById('toggle-password');
      const rememberEmail = document.getElementById('remember-email');
      const emailInput = document.getElementById('email');

      var REMEMBER_EMAIL_KEY = 'ima_staff_login_email_v1';

      if (togglePw && passwordInput) {
        togglePw.addEventListener('click', function () {
          var showPw = passwordInput.type === 'password';
          passwordInput.type = showPw ? 'text' : 'password';
          togglePw.setAttribute('aria-pressed', showPw ? 'true' : 'false');
          togglePw.setAttribute('aria-label', showPw ? 'Hide password' : 'Show password');
          togglePw.title = showPw ? 'Hide password' : 'Show password';
        });
      }

      try {
        var savedEmail = localStorage.getItem(REMEMBER_EMAIL_KEY);
        if (savedEmail && emailInput && rememberEmail) {
          emailInput.value = savedEmail;
          rememberEmail.checked = true;
        }
      } catch (eR) {}

      function show(text, ok) {
        msg.textContent = text;
        msg.className = 'msg show ' + (ok ? 'ok' : 'error');
      }

      function isStaff(profile, email) {
        const em = String(email || '')
          .trim()
          .toLowerCase();
        return (profile && profile.role === 'admin') || IMA.isAdminLoginEmail(em);
      }

      async function redirectIfStaffSession() {
        const session = await IMA.getSession();
        if (!session) return false;
        const profile = await IMA.getProfile();
        const email = session.user && session.user.email;
        if (isStaff(profile, email)) {
          window.location.replace('/admin.html');
          return true;
        }
        const sb = await IMA.getSupabase();
        await sb.auth.signOut();
        show(
          'This page is for IMA staff only. Parent accounts use the parent sign-in page.',
          false
        );
        return true;
      }

      async function boot() {
        try {
          await IMA.getSupabase();
          await redirectIfStaffSession();
        } catch (e) {
          show(e.message || String(e), false);
        }
      }

      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        msg.className = 'msg';
        btn.disabled = true;
        try {
          const sb = await IMA.getSupabase();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const { data: signData, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          let profile = await IMA.getProfile();
          if (!profile && signData.session && signData.session.access_token) {
            const pr = await fetch('/api/ensure-profile', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + signData.session.access_token,
              },
              body: JSON.stringify({}),
            });
            if (pr.ok) profile = await IMA.getProfile();
          }
          const em = signData.session && signData.session.user && signData.session.user.email;
          if (!isStaff(profile, em)) {
            await sb.auth.signOut();
            throw new Error(
              'This sign-in is for IMA staff only. Parents should use the parent sign-in page.'
            );
          }
          try {
            if (rememberEmail && rememberEmail.checked) {
              localStorage.setItem(REMEMBER_EMAIL_KEY, email);
            } else {
              localStorage.removeItem(REMEMBER_EMAIL_KEY);
            }
          } catch (eSave) {}
          window.location.replace('/admin.html');
        } catch (e) {
          show(e.message || 'Sign in failed', false);
          btn.disabled = false;
        }
      });

      boot();
    })();
  </script>
</body>
</html>
