<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Health — IMA Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ima-theme.css" />
  <style>
    .admin-layout {
      display: flex;
      min-height: calc(100vh - 64px);
      position: relative;
      z-index: 1;
    }
    .admin-sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--card2);
      padding: 20px 0;
    }
    .admin-sidebar a {
      display: block;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--font-cond);
    }
    .admin-sidebar a:hover { color: var(--cyan); }
    .admin-sidebar a.active {
      color: var(--cyan);
      box-shadow: inset 3px 0 0 var(--cyan);
      background: var(--cyan-gl);
    }
    .admin-content {
      flex: 1;
      padding: 24px 20px 48px;
      max-width: 960px;
    }
    .health-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .health-check-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      background: var(--card);
    }
    .health-check-row.bad { border-color: rgba(255, 107, 107, 0.45); }
    .health-check-row.good { border-color: rgba(34, 197, 94, 0.35); }
    .health-emoji { font-size: 20px; line-height: 1.2; }
    .health-meta { flex: 1; min-width: 0; }
    .health-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .health-count { font-size: 13px; color: var(--muted); }
    @media (max-width: 720px) {
      .admin-layout { flex-direction: column; }
      .admin-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        padding: 12px;
      }
      .admin-sidebar a { padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/admin.html">
      <img src="/logo.png" alt="" />
      <span>Admin · System Health</span>
    </a>
    <div class="app-actions">
      <button type="button" class="btn-ghost" id="btn-portal">Camp site</button>
      <button type="button" class="btn-ghost" id="btn-out">Log out</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar" aria-label="Admin navigation">
      <a href="/admin.html">Dashboard</a>
      <a href="/admin/backup">Backup</a>
      <a class="active" href="/admin/system-health.html">System Health</a>
    </aside>
    <div class="admin-content">
      <div id="banner" class="msg" style="margin-bottom:18px"></div>

      <div class="panel">
        <div class="panel-head">Quick health checks</div>
        <div class="panel-body">
          <div class="health-actions">
            <button type="button" class="btn-primary" id="btn-quick" style="width:auto;margin:0;padding:12px 22px;font-size:15px">Run checks</button>
          </div>
          <p class="panel-hint" style="margin-bottom:14px">Direct Supabase counts from this browser (same session as the rest of admin).</p>
          <div id="results-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/ima-core.js?v=20260408"></script>
  <script src="/js/26-system-health.js?v=20260331"></script>
  <script>
    (function () {
      var banner = document.getElementById('banner');
      var resultsWrap = document.getElementById('results-wrap');

      function showBanner(text, ok) {
        if (!text) {
          banner.className = 'msg';
          banner.textContent = '';
          return;
        }
        banner.textContent = text;
        banner.className = 'msg show ' + (ok ? 'ok' : 'error');
      }

      async function requireAdmin() {
        var session = await IMA.requireAuth('/admin-login.html');
        if (!session) return null;
        var profile = await IMA.getProfile();
        if (!profile) {
          showBanner('No profile found.', false);
          window.location.replace('/index.html#schedule');
          return null;
        }
        var em = String(session.user && session.user.email ? session.user.email : '').toLowerCase();
        if (profile.role !== 'admin' && !IMA.isAdminLoginEmail(em)) {
          showBanner('Admin access only.', false);
          window.location.replace('/index.html#schedule');
          return null;
        }
        return true;
      }

      async function runChecks() {
        var rows = await IMA.runQuickSystemHealthChecks();
        IMA.renderSystemHealthRows(resultsWrap, rows);
      }

      document.getElementById('btn-out').onclick = function () {
        IMA.signOut('/admin-login.html');
      };
      document.getElementById('btn-portal').onclick = function () {
        window.location.href = '/index.html#schedule';
      };

      document.getElementById('btn-quick').onclick = async function () {
        var btn = this;
        btn.disabled = true;
        showBanner('', true);
        try {
          await runChecks();
          showBanner('Checks complete.', true);
        } catch (e) {
          showBanner(e.message || 'Failed', false);
        }
        btn.disabled = false;
      };

      (async function init() {
        if (!(await requireAdmin())) return;
        try {
          await IMA.loadPublicConfig();
          window.supabaseClient = await IMA.getSupabase();
          var sid = IMA.__publicConfig && IMA.__publicConfig.studioId;
          if (sid && !window.STUDIO_ID) window.STUDIO_ID = String(sid).trim();
          await runChecks();
        } catch (e) {
          showBanner(e.message || 'Could not load', false);
        }
      })();
    })();
  </script>
</body>
</html>
